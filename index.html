<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Home</title>
    <link rel="icon" href="archivos/favicon-16x16.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            height: 100vh;
            display: grid;
            grid-template-rows: 150px 1fr;
            grid-template-columns: 200px 1fr;
            grid-template-areas: 
                "header header"
                "nav main";
        }

        header {
            grid-area: header;
            background-color: #eee;
        }

        nav {
            grid-area: nav;
            background-color: #ddd;
        }

        main {
            grid-area: main;
            background-color: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        html, body {
            height: 100%;
          
        }
        .menu-btn {
    display: none;
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px;
}

/* versión móvil */
@media (max-width: 768px) {
    .menu-btn {
        display: block;
    }

    nav {
        display: none; /* oculto por defecto */
        grid-area: nav;
    }

    nav.active {
        display: block;
    }

    body {
        grid-template-rows: auto 1fr;
        grid-template-columns: 1fr;
        grid-template-areas:
            "header"
            "main";
    }
}
     @media (max-width: 768px) {
     nav iframe {
        height: 60px;
        min-height: 60px;
    }
}
    </style>
</head>
<script>
function toggleMenu() {
    const nav = document.querySelector("nav");
    nav.classList.toggle("active");
}
</script>
<body>
    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <iframe src="archivos/logo.html" title="Logo"></iframe>
    </header>
    <nav>
        <iframe src="archivos/menu.html" title="Menú"></iframe>
    </nav>
    <main>
        <iframe src="archivos/principal.html" name="principal" title="principal"></iframe>
    </main>
</body>
</html>
