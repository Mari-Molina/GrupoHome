<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Home</title>
    <link rel="icon" href="archivos/favicon-16x16.png" type="image/x-icon">
    <style>
        ** {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-rows: 150px 1fr;
    grid-template-columns: 200px 1fr;
    grid-template-areas: 
        "header header"
        "nav main";
}

header {
    grid-area: header;
    background-color: #eee;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
}

nav {
    grid-area: nav;
    background-color: #ddd;
}

main {
    grid-area: main;
    background-color: #fff;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.menu-btn {
    display: none;
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
}

/* MÓVIL */
@media (max-width: 768px) {
    body {
        grid-template-rows: 150px 1fr;
        grid-template-columns: 1fr;
        grid-template-areas:
            "header"
            "main";
    }

    .menu-btn {
        display: block;
    }

    nav {
        position: absolute;
        top: 150px;
        left: 0;
        width: 70%;
        height: calc(100% - 150px);
        background: #ddd;
        display: none;
        z-index: 1000;
    }

    nav.active {
        display: block;
    }
}
    </style>
</head>
<script>
function toggleMenu() {
    const nav = document.querySelector("nav");
    nav.classList.toggle("active");
}
</script>
<body>
    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <iframe src="archivos/logo.html" title="Logo"></iframe>
    </header>
    <nav>
        <iframe src="archivos/menu.html" title="Menú"></iframe>
    </nav>
    <main>
        <iframe src="archivos/principal.html" name="principal" title="principal"></iframe>
    </main>
</body>
</html>
