<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Home</title>
    <link rel="icon" href="archivos/favicon-16x16.png" type="image/x-icon">
    <style>
        ** {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-rows: 150px 1fr;
    grid-template-columns: 200px 1fr;
    grid-template-areas: 
        "header header"
        "nav main";
}

header {
    grid-area: header;
    background-color: #eee;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
}

nav {
    grid-area: nav;
    background-color: #ddd;
}

main {
    grid-area: main;
    background-color: #fff;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.menu-btn {
    display: none;
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
}

/* MÓVIL */
@media (max-width: 768px) {

    .menu-btn {
        display: block;
    }

    body {
        grid-template-rows: 150px 1fr;
        grid-template-columns: 1fr;
        grid-template-areas:
            "header"
            "main";
    }

    nav {
        position: fixed;
        top: 150px;
        left: -80%;
        width: 80%;
        height: calc(100vh - 150px);
        background: #ddd;
        display: block;
        transition: left 0.3s ease;
        z-index: 1000;
    }

    nav.active {
        left: 0;
    }

}
    </style>
</head>
<script>
function toggleMenu() {
    document.querySelector("nav").classList.toggle("active");
}

window.addEventListener("message", function (event) {
    if (event.data === "closeMenu") {
        document.querySelector("nav").classList.remove("active");
    }
});
</script>
<body>
    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <iframe src="archivos/logo.html" title="Logo"></iframe>
    </header>
    <nav>
        <iframe src="archivos/menu.html" title="Menú"></iframe>
    </nav>
    <main>
        <iframe src="archivos/principal.html" name="principal" title="principal"></iframe>
    </main>
</body>
</html>
